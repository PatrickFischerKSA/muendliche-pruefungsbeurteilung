<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Beurteilung mündlicher Prüfungen</title>
    <meta
      name="description"
      content="Klickbares Formular zur Beurteilung mündlicher Prüfungen mit automatischer Notenberechnung."
    >
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="assessment" aria-labelledby="page-title">
        <div class="topbar">
          <div>
            <p class="eyebrow">Mündliche Prüfung</p>
            <h1 id="page-title">Prüfungsbeurteilung</h1>
          </div>
          <div class="actions">
            <button class="tool-button" type="button" id="clearButton" title="Formular leeren">
              <span aria-hidden="true">↺</span>
              Clear
            </button>
            <button class="tool-button" type="button" id="exportButton" title="Beurteilung exportieren">
              ⤓
              Export
            </button>
            <button class="icon-button" type="button" id="printButton" title="Drucken oder als PDF sichern" aria-label="Drucken oder als PDF sichern">
              ⎙
            </button>
          </div>
        </div>

        <form id="assessmentForm">
          <div class="meta-grid">
            <label>
              <span>Prüfungsbeurteilung für</span>
              <input id="studentName" name="studentName" type="text" autocomplete="off">
            </label>
            <label>
              <span>Datum</span>
              <input id="assessmentDate" name="assessmentDate" type="date">
            </label>
          </div>

          <div class="rubric" role="group" aria-label="Bewertungskriterien">
            <div class="rubric-header" aria-hidden="true">
              <span></span>
              <span>1</span>
              <span>2</span>
              <span>3</span>
              <span>4</span>
              <span>5</span>
            </div>
            <div id="criteriaRows"></div>
          </div>

          <div class="lower-grid">
            <label class="comment-field">
              <span>Kommentar</span>
              <textarea id="comment" name="comment" rows="6"></textarea>
            </label>

            <aside class="result-panel" aria-live="polite">
              <div class="result-note">
                <span>Note</span>
                <strong id="finalGrade">–</strong>
              </div>
              <div class="result-details">
                <span id="progressText">0 von 5 Kriterien bewertet</span>
                <span id="averageText">Punktedurchschnitt: –</span>
              </div>
              <label class="rounding-control">
                <span>Rundung</span>
                <select id="roundingSelect" name="rounding">
                  <option value="0.5">0.5</option>
                  <option value="0.25">0.25</option>
                  <option value="0.1">0.1</option>
                </select>
              </label>
            </aside>
          </div>
        </form>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
